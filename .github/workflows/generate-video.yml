name: 🎬 Generate Faceless Video

on:
  repository_dispatch:
    types: [generate-video]
  workflow_dispatch:
    inputs:
      topic:
        description: "Video topic OR full script text"
        required: true
        default: "10 Amazing Facts About Space"
        type: string
      voice:
        description: "TTS voice"
        required: false
        default: "en-US-AriaNeural"
        type: string
      keywords:
        description: "Comma-separated footage keywords (optional)"
        required: false
        default: ""
        type: string
      n8n_callback_url:
        description: "n8n webhook URL (optional)"
        required: false
        default: ""
        type: string

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🎞️ Install FFmpeg + fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-open-sans

      - name: 📦 Install Python dependencies
        run: pip install -r requirements.txt

      - name: 📋 Resolve inputs
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "topic=${{ github.event.client_payload.topic }}" >> $GITHUB_OUTPUT
            echo "voice=${{ github.event.client_payload.voice || 'en-US-AriaNeural' }}" >> $GITHUB_OUTPUT
            echo "keywords=${{ github.event.client_payload.keywords || '' }}" >> $GITHUB_OUTPUT
            echo "callback=${{ github.event.client_payload.n8n_callback_url || '' }}" >> $GITHUB_OUTPUT
          else
            echo "topic=${{ inputs.topic }}" >> $GITHUB_OUTPUT
            echo "voice=${{ inputs.voice }}" >> $GITHUB_OUTPUT
            echo "keywords=${{ inputs.keywords }}" >> $GITHUB_OUTPUT
            echo "callback=${{ inputs.n8n_callback_url }}" >> $GITHUB_OUTPUT
          fi

      - name: 🎬 Generate video
        env:
          TOPIC:          ${{ steps.vars.outputs.topic }}
          VOICE:          ${{ steps.vars.outputs.voice }}
          KEYWORDS:       ${{ steps.vars.outputs.keywords }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
        run: python scripts/generate_video.py

      - name: ☁️ Upload to Google Drive
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID:   ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python scripts/upload_gdrive.py
        continue-on-error: true

      - name: 📁 Save GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ github.run_id }}
          path: |
            output/final_video.mp4
            output/script.txt
            output/voiceover.srt
          retention-days: 7
